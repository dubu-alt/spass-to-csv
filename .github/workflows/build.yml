name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install ".[build]"

      - name: Build app
        run: >
          python -m PyInstaller
          --name "SPass CSV Converter"
          --windowed
          --onefile
          --clean
          --paths src
          --collect-all tkinterdnd2
          src/spass_csv_converter/__main__.py

      - name: Package release file (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "SPass-CSV-Converter-macOS.zip" "SPass CSV Converter.app"

      - name: Package release file (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "dist/SPass CSV Converter.exe" "dist/SPass-CSV-Converter-Windows.exe"

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: spass-csv-converter-${{ matrix.os }}
          path: dist/*

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SPass-CSV-Converter-macOS.zip
            dist/SPass-CSV-Converter-Windows.exe
          generate_release_notes: true
